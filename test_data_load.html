<!DOCTYPE html>
<html>
<head>
    <title>Test Data Loading</title>
</head>
<body>
    <h1>Testing Data Loading</h1>
    <div id="status">Loading...</div>
    
    <script>
        async function testLoad() {
            try {
                console.log('Testing data load...');
                const response = await fetch('all_top3_data.json');
                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Data loaded successfully:', data.length, 'matches');
                    document.getElementById('status').innerHTML = 
                        `<p style="color: green;">✓ Data loaded successfully: ${data.length} matches</p>`;
                    
                    // Test first match structure
                    if (data.length > 0) {
                        console.log('First match structure:', JSON.stringify(data[0], null, 2));
                    }
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('status').innerHTML = 
                    `<p style="color: red;">✗ Error loading data: ${error.message}</p>`;
            }
        }
        
        testLoad();
    </script>
</body>
</html>
