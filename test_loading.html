<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Data Loading</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .log { background: #f8f8f8; padding: 10px; border: 1px solid #ddd; margin: 10px 0; font-family: monospace; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Data Loading</h1>
        <p>This page tests the new data loading mechanism.</p>
        
        <div id="status" class="log">Testing...</div>
        
        <button onclick="testLoading()">Test Loading</button>
        <button onclick="testCombinedFile()">Test Combined File Only</button>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        
        function log(message, type = 'info') {
            const span = document.createElement('span');
            span.className = type;
            span.textContent = message + '\n';
            statusDiv.appendChild(span);
            console.log(message);
        }
        
        async function testLoading() {
            statusDiv.innerHTML = '';
            log('Starting data loading test...', 'info');
            
            try {
                const data = await loadFromSplitFiles();
                log(`✓ Successfully loaded ${data.length} matches`, 'success');
                
                // Test a few matches
                if (data.length > 0) {
                    const firstMatch = data[0];
                    log(`✓ First match ID: ${firstMatch.match_id}`, 'success');
                    log(`✓ First match has ${firstMatch.players.length} players`, 'success');
                }
                
            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
            }
        }
        
        async function testCombinedFile() {
            statusDiv.innerHTML = '';
            log('Testing combined file loading...', 'info');
            
            try {
                const response = await fetch('all_top3_data.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`✓ Successfully loaded ${data.length} matches from combined file`, 'success');
                
            } catch (error) {
                log(`✗ Error loading combined file: ${error.message}`, 'error');
            }
        }
        
        // Load data from split files (copied from index.html)
        async function loadFromSplitFiles() {
            try {
                console.log('Loading data from split files...');
                
                // Get today's date for the data directory
                const today = new Date().toISOString().split('T')[0];
                const dataDir = `data/${today}/`;
                
                // Try to load from split files first
                const data = [];
                let part = 1;
                let hasMore = true;
                
                while (hasMore) {
                    try {
                        const filename = `${dataDir}matches_part_${part}.json`;
                        console.log(`Loading ${filename}...`);
                        
                        const response = await fetch(filename);
                        if (!response.ok) {
                            // If we can't load the next part, we're done
                            if (response.status === 404) {
                                hasMore = false;
                                break;
                            }
                            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        }
                        
                        const partData = await response.json();
                        data.push(...partData);
                        console.log(`Loaded part ${part}: ${partData.length} matches`);
                        part++;
                        
                    } catch (error) {
                        console.warn(`Could not load part ${part}:`, error.message);
                        hasMore = false;
                    }
                }
                
                if (data.length === 0) {
                    throw new Error('No split data files found, trying combined file...');
                }
                
                console.log(`Loaded ${data.length} matches from ${part - 1} files`);
                return data;
                
            } catch (error) {
                console.error('Error loading split files:', error);
                
                // Fallback to combined file
                console.log('Attempting to load combined file as fallback...');
                try {
                    const response = await fetch('all_top3_data.json');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log(`Loaded ${data.length} matches from combined file`);
                    return data;
                    
                } catch (fallbackError) {
                    console.error('Error loading combined file:', fallbackError);
                    throw new Error('Could not load data from either split files or combined file');
                }
            }
        }
    </script>
</body>
</html>
